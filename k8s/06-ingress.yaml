apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: agri-mortgage-ingress
  namespace: agri-mortgage
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "25m"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - agri-mortgage.example.com
      secretName: agri-mortgage-tls
  rules:
    - host: agri-mortgage.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: agri-mortgage-backend
                port:
                  number: 80
          - path: /
            pathType: Prefix
            backend:
              service:
                name: agri-mortgage-frontend
                port:
                  number: 80
