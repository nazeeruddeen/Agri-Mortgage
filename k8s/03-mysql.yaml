apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: agri-mortgage-mysql-pvc
  namespace: agri-mortgage
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
# Integration-only single-node MySQL manifest.
# Production should point the application at a managed HA MySQL endpoint through ExternalSecret-backed settings.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agri-mortgage-mysql
  namespace: agri-mortgage
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agri-mortgage-mysql
  template:
    metadata:
      labels:
        app: agri-mortgage-mysql
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: mysql
          image: mysql:8.4
          ports:
            - containerPort: 3306
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: agri-mortgage-secret
                  key: MYSQL_ROOT_PASSWORD
            - name: MYSQL_DATABASE
              value: agri_mortgage_loan_system
            - name: MYSQL_USER
              value: agri_mortgage_app
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: agri-mortgage-secret
                  key: MYSQL_APP_PASSWORD
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - MYSQL_PWD="$MYSQL_ROOT_PASSWORD" mysqladmin ping -h 127.0.0.1 -uroot --silent > /dev/null
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - MYSQL_PWD="$MYSQL_ROOT_PASSWORD" mysqladmin ping -h 127.0.0.1 -uroot --silent > /dev/null
            initialDelaySeconds: 90
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          volumeMounts:
            - name: mysql-data
              mountPath: /var/lib/mysql
      volumes:
        - name: mysql-data
          persistentVolumeClaim:
            claimName: agri-mortgage-mysql-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: agri-mortgage-mysql
  namespace: agri-mortgage
spec:
  selector:
    app: agri-mortgage-mysql
  ports:
    - port: 3306
      targetPort: 3306
