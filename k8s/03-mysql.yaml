apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: agri-mortgage-mysql-pvc
  namespace: agri-mortgage
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agri-mortgage-mysql
  namespace: agri-mortgage
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agri-mortgage-mysql
  template:
    metadata:
      labels:
        app: agri-mortgage-mysql
    spec:
      containers:
        - name: mysql
          image: mysql:8.4
          ports:
            - containerPort: 3306
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: agri-mortgage-secret
                  key: SPRING_DATASOURCE_PASSWORD
            - name: MYSQL_DATABASE
              value: agri_mortgage_loan_system
          volumeMounts:
            - name: mysql-data
              mountPath: /var/lib/mysql
      volumes:
        - name: mysql-data
          persistentVolumeClaim:
            claimName: agri-mortgage-mysql-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: agri-mortgage-mysql
  namespace: agri-mortgage
spec:
  selector:
    app: agri-mortgage-mysql
  ports:
    - port: 3306
      targetPort: 3306
