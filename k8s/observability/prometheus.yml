global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - agri-mortgage-alertmanager.agri-mortgage.svc.cluster.local:9093

rule_files:
  - /etc/prometheus/alert-rules.yml

scrape_configs:
  - job_name: agri-mortgage-backend
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - agri-mortgage-backend.agri-mortgage.svc.cluster.local:80
        labels:
          app: agri-mortgage-backend
          environment: kubernetes
          namespace: agri-mortgage
