groups:
  - name: agri-mortgage-domain
    rules:
      - alert: AgriMortgageGatewayErrorsPresent
        expr: agri_mortgage_encumbrance_status_count{status="gateway_error"} > 0
        for: 10m
        labels:
          severity: warning
          service: agri-mortgage
        annotations:
          summary: Encumbrance gateway errors are blocking agri cases
          description: One or more agri mortgage applications are stuck in GATEWAY_ERROR for over 10 minutes.

      - alert: AgriMortgageDocumentsBacklogHigh
        expr: agri_mortgage_documents_count{state="pending"} > 5
        for: 20m
        labels:
          severity: warning
          service: agri-mortgage
        annotations:
          summary: Required agri mortgage documents are still pending
          description: More than 5 agri mortgage applications are waiting on document verification.

      - alert: AgriMortgageReviewQueueHigh
        expr: agri_mortgage_applications_status_count{status=~"credit_review|legal_review"} > 3
        for: 20m
        labels:
          severity: info
          service: agri-mortgage
        annotations:
          summary: Agri review queue is growing
          description: Credit or legal review queues have remained above 3 for 20 minutes.

      - alert: AgriMortgageWorkflowLatencyHigh
        expr: histogram_quantile(0.95, sum by (le) (rate(http_server_requests_seconds_bucket{job="agri-mortgage-backend",uri=~"/api/v1/agri-mortgage-applications.*"}[5m]))) > 2
        for: 15m
        labels:
          severity: warning
          service: agri-mortgage
        annotations:
          summary: Agri workflow latency is above the SLO
          description: The p95 latency for core agri mortgage workflow endpoints has been above 2 seconds for 15 minutes.

      - alert: AgriMortgageWorkflowErrorRatioHigh
        expr: (sum(rate(http_server_requests_seconds_count{job="agri-mortgage-backend",uri=~"/api/v1/agri-mortgage-applications.*",status=~"5.."}[5m])) / clamp_min(sum(rate(http_server_requests_seconds_count{job="agri-mortgage-backend",uri=~"/api/v1/agri-mortgage-applications.*"}[5m])), 0.001)) > 0.02
        for: 10m
        labels:
          severity: critical
          service: agri-mortgage
        annotations:
          summary: Agri workflow 5xx ratio is above the SLO
          description: Core agri mortgage workflow endpoints have exceeded a 2% 5xx ratio for 10 minutes.
