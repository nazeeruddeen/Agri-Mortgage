services:
  mysql:
    image: mysql:8.4
    container_name: agri-mortgage-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: agri_mortgage_loan_system
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: agri-mortgage-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SERVER_PORT: 8011
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/agri_mortgage_loan_system?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      APP_SECURITY_JWT_SECRET: QUJDREVGR0hJSktMTU5PUFFSU1RVVldYWVo0NTY3ODkwQUJDREVGR0hJSktMTU5PUFFSU1RVVg==
      APP_SECURITY_JWT_ACCESS_TOKEN_EXPIRATION_MS: 900000
      APP_SECURITY_JWT_REFRESH_TOKEN_EXPIRATION_MS: 604800000
      SPRING_JPA_SHOW_SQL: "false"
    ports:
      - "8011:8011"
