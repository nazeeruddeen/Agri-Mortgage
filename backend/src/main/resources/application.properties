spring.application.name=agri-mortgage-loan-system
server.port=${SERVER_PORT:8011}
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/agri_mortgage_loan_system?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.open-in-view=false
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=${SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE:50MB}
spring.servlet.multipart.max-request-size=${SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE:50MB}
app.security.jwt.secret=${APP_SECURITY_JWT_SECRET}
app.security.jwt.access-token-expiration-ms=${APP_SECURITY_JWT_ACCESS_TOKEN_EXPIRATION_MS:900000}
app.security.jwt.refresh-token-expiration-ms=${APP_SECURITY_JWT_REFRESH_TOKEN_EXPIRATION_MS:604800000}
app.security.allowed-origin-patterns=${APP_SECURITY_ALLOWED_ORIGIN_PATTERNS:http://localhost:*}
app.security.bootstrap-users.enabled=${APP_SECURITY_BOOTSTRAP_USERS_ENABLED:false}
logging.level.com.employee.loan_system=INFO
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when-authorized
management.endpoint.health.probes.enabled=true
